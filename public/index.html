<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Music Practice</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body>
    <div class="container">
      <button id="toggleDark" style="float:right;margin:0 0 8px 8px">🌙 Dark Mode</button>
      <h1>Music Practice</h1>

      <div id="auth">
        <input id="email" placeholder="Email">
        <input id="name" placeholder="Name (register)">
        <input id="password" placeholder="Password" type="password">
        <button id="registerBtn">Register</button>
        <button id="loginBtn">Login</button>
      </div>

      <nav style="margin-bottom:16px">
        <a href="/">Home</a> |
        <a href="/dashboard">Dashboard</a> |
        <a href="/tools/piano">Piano</a> |
        <a href="/tools/pitchpipe">Pitch Pipe</a> |
        <a href="/tools/chordfinder">Chord Finder</a> |
        <a href="/tools/practicetimer">Practice Timer</a>
      </nav>
      <div id="app" style="display:none">
        <div class="profile">Logged in as <span id="me"></span> <button id="logout">Logout</button></div>
        <section class="profile-edit">
          <h2>Profile</h2>
          <input id="p_name" placeholder="Name">
          <input id="p_email" placeholder="Email">
          <button id="saveProfile">Save Profile</button>
          <div>
            <input id="oldPass" placeholder="Old password" type="password">
            <input id="newPass" placeholder="New password" type="password">
            <button id="changePass">Change Password</button>
          </div>
        </section>

        <section class="tools">
          <h2>Metronome</h2>
          <div>BPM: <input id="bpm" type="range" min="40" max="240" value="90"> <span id="bpmVal">90</span></div>
          <button id="toggleMetro">Start</button>
        </section>

        <section class="tools">
          <h2>Tuner (basic)</h2>
          <button id="startTuner">Start Tuner</button>
          <div id="tunerPitch">-- Hz</div>
        </section>

        <section class="practice">
          <h2>Practice Session</h2>
          <div>Timer: <span id="timer">00:00:00</span></div>
          <button id="startSession">Start</button>
          <button id="stopSession" disabled>Stop</button>
          <div>
            <textarea id="notes" placeholder="Notes for this session"></textarea>
            <button id="saveNotes">Save notes</button>
          </div>
        </section>

        <section class="recording">
          <h2>Record</h2>
          <button id="startRec">Start Recording</button>
          <button id="stopRec" disabled>Stop & Upload</button>
          <ul id="recordings"></ul>
        </section>

        <section class="progress">
          <h2>Progress</h2>
          <div id="progressSummary"></div>
        </section>
      </div>
    </div>
    <script src="/public/app.js"></script>
  </body>
</html>
